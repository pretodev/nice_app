name: nice
description: 'A new Flutter project.'

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.2

dependencies:
  flutter:
    sdk: flutter
  odu_core:
    git:
      url: https://github.com/pretodev/odu_core.git
      ref: main

  cupertino_icons: ^1.0.8
  uuid: ^4.5.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  flutter_svg: ^2.2.3
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^10.0.0
  equatable: ^2.0.8
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
